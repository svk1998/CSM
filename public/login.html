<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeSpace Manager Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #081019;
      --surface: rgba(14, 20, 29, 0.88);
      --surface-strong: #101926;
      --border: rgba(105, 141, 176, 0.2);
      --text: #edf2f7;
      --muted: #8ca0b3;
      --accent: #4fd1c5;
      --danger: #f56565;
      --sans: "Syne", sans-serif;
      --mono: "JetBrains Mono", monospace;
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--mono);
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(79, 209, 197, 0.18), transparent 35%),
        linear-gradient(180deg, #071019 0%, #04070d 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.85), transparent);
      pointer-events: none;
    }

    .shell {
      width: 100%;
      max-width: 420px;
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(79, 209, 197, 0.12);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      font-family: var(--sans);
      font-size: clamp(2rem, 5vw, 2.6rem);
      line-height: 0.95;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .terminal {
      margin-bottom: 22px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(6, 10, 16, 0.85);
      border: 1px solid rgba(79, 209, 197, 0.12);
      color: #b6f4ee;
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
    }

    .prompt {
      color: var(--accent);
      margin-right: 8px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-strong);
      padding: 14px 16px;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      border-color: rgba(79, 209, 197, 0.8);
      box-shadow: 0 0 0 4px rgba(79, 209, 197, 0.12);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 10px;
      background: linear-gradient(135deg, var(--accent), #73f3b7);
      color: #06201d;
      font: 600 14px var(--mono);
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .button-row {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .session-panel {
      display: none;
      gap: 14px;
    }

    .session-panel.show {
      display: grid;
    }

    .session-panel p {
      margin-bottom: 0;
    }

    .session-meta {
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(6, 10, 16, 0.85);
      border: 1px solid rgba(79, 209, 197, 0.12);
      color: #b6f4ee;
      font-size: 13px;
      line-height: 1.6;
    }

    .error {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(245, 101, 101, 0.12);
      border: 1px solid rgba(245, 101, 101, 0.22);
      color: var(--danger);
      font-size: 13px;
      line-height: 1.5;
    }

    .error.show { display: block; }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div id="eyebrow" class="eyebrow">Secure workspace gateway</div>
    <h1 id="pageTitle">CodeSpace Manager</h1>
    <p id="pageDescription">Sign in to launch an isolated code-server workspace behind a single managed access layer.</p>

    <div class="terminal"><span class="prompt">$</span> connect workspace://codespace-manager</div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="your_username" autofocus required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
      </div>

      <button id="submitButton" type="submit">Sign in</button>
    </form>

    <section id="sessionPanel" class="session-panel" aria-live="polite">
      <div id="sessionMeta" class="session-meta"></div>
      <div class="button-row">
        <button id="continueButton" type="button">Continue</button>
        <button id="switchButton" class="secondary" type="button">Sign out to switch account</button>
      </div>
    </section>

    <div id="errorBox" class="error" role="alert"></div>
    <div class="footer">Built for multi-user development teams</div>
  </main>

  <script>
    const eyebrow = document.getElementById('eyebrow');
    const pageTitle = document.getElementById('pageTitle');
    const pageDescription = document.getElementById('pageDescription');
    const form = document.getElementById('loginForm');
    const button = document.getElementById('submitButton');
    const sessionPanel = document.getElementById('sessionPanel');
    const sessionMeta = document.getElementById('sessionMeta');
    const continueButton = document.getElementById('continueButton');
    const switchButton = document.getElementById('switchButton');
    const errorBox = document.getElementById('errorBox');
    const query = new URLSearchParams(window.location.search);
    const reason = query.get('reason');

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('show');
    }

    function hideError() {
      errorBox.textContent = '';
      errorBox.classList.remove('show');
    }

    function applySessionState(session) {
      const destination = session.user.isAdmin ? '/admin' : '/workspace/';
      const roleLabel = session.user.isAdmin ? 'administrator' : 'workspace user';

      eyebrow.textContent = 'Session active';
      pageTitle.textContent = `Signed in as ${session.user.username}`;
      pageDescription.textContent = reason === 'admin' && !session.user.isAdmin
        ? 'This browser is currently using a workspace-user session. Sign out to switch back to an administrator account.'
        : `This browser is currently using a ${roleLabel} session. Continue where you left off or sign out to use another account.`;

      form.style.display = 'none';
      sessionPanel.classList.add('show');
      sessionMeta.textContent = session.user.isAdmin
        ? 'Administrator session detected. You can return to the control plane immediately.'
        : 'Workspace session detected. To reach the admin panel again, sign out and log back in as an administrator.';
      continueButton.textContent = session.user.isAdmin ? 'Go to admin' : 'Go to workspace';
      continueButton.onclick = () => {
        window.location.href = destination;
      };
    }

    async function loadSessionState() {
      const response = await fetch('/api/auth/session');
      const session = await response.json();

      if (session.authenticated) {
        applySessionState(session);
        return;
      }

      form.style.display = '';
      sessionPanel.classList.remove('show');

      if (reason === 'admin') {
        showError('Admin access requires an administrator account. Sign out and log in again as admin.');
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      hideError();
      button.disabled = true;
      button.textContent = 'Signing in...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Login failed.');
        }

        window.location.href = payload.redirect;
      } catch (error) {
        showError(error.message);
        button.disabled = false;
        button.textContent = 'Sign in';
      }
    });

    switchButton.addEventListener('click', async () => {
      hideError();
      switchButton.disabled = true;
      continueButton.disabled = true;

      try {
        const response = await fetch('/api/auth/logout', { method: 'POST' });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || 'Logout failed.');
        }

        window.location.href = '/login';
      } catch (error) {
        showError(error.message);
        switchButton.disabled = false;
        continueButton.disabled = false;
      }
    });

    loadSessionState().catch((error) => {
      showError(error.message || 'Failed to load session.');
    });
  </script>
</body>
</html>
